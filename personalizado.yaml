# Configuración personalizada para YOLOv5
# Ruta base del dataset relativa al directorio de trabajo de Colab
# El notebook clona Activity_yolov5 en /content/Activity_yolov5
path: /content/Activity_yolov5/data  # ruta absoluta al directorio data en Colab
train: images/train                   # imágenes de entrenamiento
val: images/val                       # imágenes de validación

# Clases del detector de daños en paneles solares
nc: 3
names:
  - Hotspots_BurnedCells  # Clase 0: puntos calientes / celdas quemadas
  - Broken_Cracks         # Clase 1: paneles rotos / grietas
  - Soiling               # Clase 2: suciedad superficial
